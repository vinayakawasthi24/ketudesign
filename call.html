<!DOCTYPE html>
<html lang="en">
<head>

<body class="bg-[#030d22] text-white font-sans min-h-screen flex items-center justify-center p-6 text-center">

  <div class="max-w-md w-full border border-slate-800 bg-slate-900/40 backdrop-blur-md p-8 rounded-3xl shadow-2xl flex flex-col items-center">
    
    <div class="relative mb-6">

    <p class="text-sm text-slate-400 leading-relaxed mb-8">
      Your device is now prompting a direct call to our corporate workspace team at <br>
      <span class="text-[#dfcfbe] font-medium tracking-wide font-sans block mt-1">+91 92892 52190</span>
    </p>

    <a href="tel:+918398801801" class="w-full inline-flex items-center justify-center gap-3 bg-[#dfcfbe] hover:bg-[#d1beab] text-[#030d22] px-6 py-3.5 rounded-full text-xs uppercase tracking-widest font-semibold transition-colors duration-300">
      Click if call didn't start

  </div>

  <script>
    window.top.location.href = "tel:+918398801801";
  </script>

</html>
